name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # The Supabase publishable key is safe to expose in client builds (protected by RLS).
      # You can override these by adding repository Secrets with the same names.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://ifdmvdurljbrnkezrohd.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_hJaMpol2IfB8C6TMXHoFFA_xA0Vj4la' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Enable Pages automatically (no manual Settings toggle needed)
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
